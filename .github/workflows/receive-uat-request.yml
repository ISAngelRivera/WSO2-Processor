# =============================================================================
# WSO2-Processor: Extractor de APIs de WSO2
# =============================================================================
# Vendor-específico: Solo extrae datos de WSO2 y los pasa a Helix-Processor
# NO contiene lógica de negocio, Helix, ni almacenamiento
# =============================================================================
name: Receive UAT Request

on:
  workflow_dispatch:
    inputs:
      apiId:
        description: 'WSO2 API ID'
        required: true
        type: string
      apiName:
        description: 'API Name'
        required: true
        type: string
      apiVersion:
        description: 'API Version'
        required: true
        type: string
      apiContext:
        description: 'API Context path'
        required: false
        type: string
        default: ''
      userId:
        description: 'User who triggered the registration'
        required: false
        type: string
        default: 'unknown'
      timestamp:
        description: 'Request timestamp'
        required: false
        type: string

env:
  WSO2_BASE_URL: https://wso2-apim:9443
  WSO2_USERNAME: admin
  WSO2_PASSWORD: admin
  HELIX_PROCESSOR_REPO: ISAngelRivera/GIT-Helix-Processor

jobs:
  extract-and-forward:
    name: Extract API from WSO2
    runs-on: [self-hosted, linux, apiops]

    steps:
      - name: Log Request
        run: |
          echo "=========================================="
          echo "  WSO2 API Extraction Request"
          echo "=========================================="
          echo "API ID:      ${{ inputs.apiId }}"
          echo "API Name:    ${{ inputs.apiName }}"
          echo "API Version: ${{ inputs.apiVersion }}"
          echo "User:        ${{ inputs.userId }}"
          echo "=========================================="

      - name: Get WSO2 OAuth Token
        id: wso2-token
        run: |
          echo "Getting OAuth token from WSO2..."

          CLIENT_RESPONSE=$(curl -sk -X POST \
            -H "Authorization: Basic $(echo -n 'admin:admin' | base64)" \
            -H "Content-Type: application/json" \
            -d '{"callbackUrl":"https://localhost","clientName":"wso2_processor_${{ github.run_id }}","owner":"admin","grantType":"client_credentials password refresh_token","saasApp":true}' \
            "${{ env.WSO2_BASE_URL }}/client-registration/v0.17/register" 2>/dev/null || echo '{}')

          CLIENT_ID=$(echo "$CLIENT_RESPONSE" | jq -r '.clientId // empty')
          CLIENT_SECRET=$(echo "$CLIENT_RESPONSE" | jq -r '.clientSecret // empty')

          if [ -z "$CLIENT_ID" ]; then
            echo "ERROR: WSO2 not reachable"
            exit 1
          fi

          TOKEN_RESPONSE=$(curl -sk -X POST \
            -H "Authorization: Basic $(echo -n "$CLIENT_ID:$CLIENT_SECRET" | base64)" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=password&username=admin&password=admin&scope=apim:api_view" \
            "${{ env.WSO2_BASE_URL }}/oauth2/token" 2>/dev/null || echo '{}')

          ACCESS_TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.access_token // empty')

          if [ -z "$ACCESS_TOKEN" ]; then
            echo "ERROR: Could not get access token"
            exit 1
          fi

          echo "token=$ACCESS_TOKEN" >> $GITHUB_OUTPUT
          echo "Token obtained"

      - name: Export API from WSO2
        id: export
        run: |
          echo "Exporting API from WSO2..."

          # Exportar api.json
          API_JSON=$(curl -sk -H "Authorization: Bearer ${{ steps.wso2-token.outputs.token }}" \
            "${{ env.WSO2_BASE_URL }}/api/am/publisher/v4/apis/${{ inputs.apiId }}")

          # Exportar swagger.json
          SWAGGER_JSON=$(curl -sk -H "Authorization: Bearer ${{ steps.wso2-token.outputs.token }}" \
            "${{ env.WSO2_BASE_URL }}/api/am/publisher/v4/apis/${{ inputs.apiId }}/swagger")

          # Extraer subdominio de additionalProperties
          SUBDOMINIO=$(echo "$API_JSON" | jq -r '.additionalProperties[]? | select(.name=="subdominio") | .value // empty')

          # Si no está, buscar en additionalPropertiesMap
          if [ -z "$SUBDOMINIO" ]; then
            SUBDOMINIO=$(echo "$API_JSON" | jq -r '.additionalPropertiesMap.subdominio // empty')
          fi

          # Extraer backend URL
          BACKEND_URL=$(echo "$API_JSON" | jq -r '.endpointConfig.production_endpoints.url // "unknown"')

          echo "Subdominio: $SUBDOMINIO"
          echo "Backend: $BACKEND_URL"

          # Validar que subdominio está especificado
          if [ -z "$SUBDOMINIO" ]; then
            echo "=========================================="
            echo "  ERROR: Campo 'subdominio' no especificado"
            echo "=========================================="
            echo ""
            echo "La API debe tener una propiedad adicional 'subdominio'"
            echo "Para configurarlo:"
            echo "1. Ve a la API en el Publisher"
            echo "2. Properties > Additional Properties"
            echo "3. Añade: subdominio = <nombre-subdominio>"
            echo ""
            exit 1
          fi

          # Codificar en base64 para pasar al siguiente workflow
          API_JSON_B64=$(echo "$API_JSON" | base64 -w 0)
          SWAGGER_JSON_B64=$(echo "$SWAGGER_JSON" | base64 -w 0)

          echo "subdominio=$SUBDOMINIO" >> $GITHUB_OUTPUT
          echo "backend_url=$BACKEND_URL" >> $GITHUB_OUTPUT
          echo "api_json_b64=$API_JSON_B64" >> $GITHUB_OUTPUT
          echo "swagger_json_b64=$SWAGGER_JSON_B64" >> $GITHUB_OUTPUT

          echo "API exported successfully"

      - name: Forward to Helix-Processor
        env:
          GH_TOKEN: ${{ secrets.GIT_HELIX_PAT }}
        run: |
          echo "Forwarding to Helix-Processor..."

          # Llamar al workflow de Helix-Processor
          gh workflow run process-api-request.yml \
            --repo "${{ env.HELIX_PROCESSOR_REPO }}" \
            -f subdominio="${{ steps.export.outputs.subdominio }}" \
            -f apiName="${{ inputs.apiName }}" \
            -f apiVersion="${{ inputs.apiVersion }}" \
            -f apiContext="${{ inputs.apiContext }}" \
            -f backendUrl="${{ steps.export.outputs.backend_url }}" \
            -f apiJson="${{ steps.export.outputs.api_json_b64 }}" \
            -f swaggerJson="${{ steps.export.outputs.swagger_json_b64 }}" \
            -f sourceSystem="wso2" \
            -f userId="${{ inputs.userId }}" \
            -f sourceRunUrl="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          echo ""
          echo "=========================================="
          echo "  Request forwarded to Helix-Processor"
          echo "  Subdominio: ${{ steps.export.outputs.subdominio }}"
          echo "=========================================="

      - name: Summary
        run: |
          echo "## WSO2 API Extracted" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| API | ${{ inputs.apiName }} v${{ inputs.apiVersion }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Subdominio | ${{ steps.export.outputs.subdominio }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | ${{ steps.export.outputs.backend_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Forwarded to Helix-Processor for processing." >> $GITHUB_STEP_SUMMARY
